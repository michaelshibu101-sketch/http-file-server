<!DOCTYPE html>
<html>
<head>
<title>C++ Search Engine</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:70%;
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#38bdf8;
border:none;
cursor:pointer;
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>C++ Document Search</h1>

<form action="/search" method="get">

<input name="q" placeholder="Search documents...">

<button type="submit">Search</button>

</form>

</div>
</div>

</body>
</html>
